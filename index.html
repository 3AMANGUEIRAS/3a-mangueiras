<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>3A Mangueiras e Fixadores — CRM</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:system-ui,sans-serif;background:#f4f4f4;min-height:100vh;}
.nav{background:#1D9E75;display:flex;align-items:center;padding:0;position:sticky;top:0;z-index:100;}
.nav-logo{color:#fff;font-size:14px;font-weight:500;padding:12px 16px;border-right:0.5px solid #0F6E56;}
.nav-btn{background:none;border:none;color:#9FE1CB;padding:12px 16px;font-size:13px;cursor:pointer;border-bottom:3px solid transparent;}
.nav-btn.active{color:#fff;border-bottom:3px solid #fff;}
.nav-btn:hover{color:#fff;}
.page{display:none;padding:1rem;max-width:680px;margin:0 auto;}
.page.active{display:block;}
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:1rem;}
.stat{background:#fff;border-radius:8px;padding:12px;border:0.5px solid #ddd;}
.stat-label{font-size:12px;color:#666;margin-bottom:4px;}
.stat-val{font-size:22px;font-weight:500;color:#222;}
.toolbar{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap;}
.toolbar input,.toolbar select{flex:1;min-width:100px;border:0.5px solid #ddd;border-radius:8px;padding:7px 10px;font-size:13px;background:#fff;color:#222;}
.btn-export{background:#1D9E75;color:#fff;border:none;border-radius:8px;padding:7px 12px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:5px;white-space:nowrap;}
.btn-export:hover{background:#0F6E56;}
.card{background:#fff;border:0.5px solid #ddd;border-radius:12px;overflow:hidden;margin-bottom:1rem;}
.card-header{padding:12px 16px;border-bottom:0.5px solid #ddd;display:flex;align-items:center;justify-content:space-between;}
.card-header h3{font-size:14px;font-weight:500;color:#222;}
.lead-row{padding:10px 16px;border-bottom:0.5px solid #eee;display:flex;align-items:center;gap:10px;cursor:pointer;}
.lead-row:last-child{border-bottom:none;}
.lead-row:hover{background:#f9f9f9;}
.av{width:34px;height:34px;border-radius:50%;background:#E1F5EE;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;color:#085041;flex-shrink:0;}
.lead-info{flex:1;min-width:0;}
.lead-info p{font-size:13px;font-weight:500;color:#222;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lead-info span{font-size:12px;color:#666;}
.status-pill{font-size:11px;padding:3px 8px;border-radius:10px;white-space:nowrap;cursor:pointer;}
.s-Novo{background:#E1F5EE;color:#085041;}
.s-Em.atendimento{background:#E6F1FB;color:#0C447C;}
.s-Finalizado{background:#EAF3DE;color:#27500A;}
.detail-box{background:#f4f4f4;border-radius:12px;padding:1rem;margin-bottom:1rem;display:none;border:0.5px solid #ddd;}
.detail-box.open{display:block;}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.detail-field label{font-size:11px;color:#666;display:block;margin-bottom:2px;}
.detail-field p{font-size:13px;color:#222;}
.hist-item{font-size:12px;color:#666;padding:4px 0;border-bottom:0.5px solid #ddd;display:flex;gap:8px;}
.hist-item:last-child{border-bottom:none;}
.wbtn{display:flex;align-items:center;gap:6px;color:#fff;border:none;border-radius:8px;padding:9px 14px;font-size:13px;cursor:pointer;font-weight:500;width:100%;justify-content:center;margin-top:8px;background:#25D366;}
.wbtn:hover{opacity:0.9;}
.empty{text-align:center;padding:2rem;color:#888;font-size:13px;}
.loading{text-align:center;padding:2rem;color:#1D9E75;font-size:13px;}
.chat-header{background:#1D9E75;padding:12px 16px;display:flex;align-items:center;gap:10px;border-radius:12px 12px 0 0;}
.chat-header h2{color:#fff;font-size:14px;font-weight:500;}
.chat-header p{color:#9FE1CB;font-size:12px;}
.chat-av{width:38px;height:38px;border-radius:50%;background:#5DCAA5;display:flex;align-items:center;justify-content:center;}
.chat-area{background:#f0f0f0;border-left:0.5px solid #ddd;border-right:0.5px solid #ddd;min-height:380px;padding:12px;display:flex;flex-direction:column;gap:8px;}
.bubble{max-width:85%;padding:9px 13px;border-radius:12px;font-size:14px;line-height:1.5;}
.bubble.bot{background:#fff;border:0.5px solid #ddd;color:#222;align-self:flex-start;border-radius:4px 12px 12px 12px;}
.bubble.user{background:#1D9E75;color:#fff;align-self:flex-end;border-radius:12px 4px 12px 12px;}
.opts{display:flex;flex-direction:column;gap:5px;}
.opt-btn{background:#fff;border:0.5px solid #1D9E75;color:#0F6E56;padding:7px 13px;border-radius:20px;font-size:13px;cursor:pointer;text-align:left;}
.opt-btn:hover{background:#E1F5EE;}
.chat-input-area{background:#fff;border:0.5px solid #ddd;border-radius:0 0 12px 12px;padding:8px 10px;display:flex;gap:6px;align-items:center;}
.chat-input-area input{flex:1;border:0.5px solid #ddd;border-radius:20px;padding:7px 12px;font-size:13px;background:#f4f4f4;color:#222;}
.chat-input-area input:focus{outline:none;border-color:#1D9E75;}
.send-btn{background:#1D9E75;border:none;border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;flex-shrink:0;}
.tag{display:inline-block;font-size:11px;background:#E1F5EE;color:#085041;border-radius:10px;padding:2px 7px;margin-bottom:3px;}
.rcard{background:#fff;border:0.5px solid #ddd;border-radius:12px;padding:12px;margin-top:4px;}
.rcard p{font-size:12px;color:#666;margin-bottom:8px;}
</style>
</head>
<body>
<div class="nav">
  <span class="nav-logo"><i class="ti ti-building-store" style="font-size:14px;vertical-align:-2px;margin-right:4px;"></i>3A Mangueiras</span>
  <button class="nav-btn active" onclick="showPage('bot',this)"><i class="ti ti-message-chatbot" style="font-size:14px;vertical-align:-2px;margin-right:3px;"></i>Atendimento</button>
  <button class="nav-btn" onclick="showPage('painel',this)"><i class="ti ti-users" style="font-size:14px;vertical-align:-2px;margin-right:3px;"></i>Leads</button>
</div>

<div class="page active" id="page-bot">
  <div style="max-width:420px;margin:1rem auto;">
    <div class="chat-header">
      <div class="chat-av"><i class="ti ti-headset" style="font-size:18px;color:#fff;"></i></div>
      <div><h2>3A Mangueiras e Fixadores</h2><p>Assistente virtual</p></div>
    </div>
    <div class="chat-area" id="chat"></div>
    <div class="chat-input-area">
      <input type="text" id="userInput" placeholder="Simulação do bot..." />
      <button class="send-btn" onclick="sendUserMsg()"><i class="ti ti-send" style="font-size:14px;"></i></button>
    </div>
  </div>
</div>

<div class="page" id="page-painel">
  <div style="padding-top:1rem;">
    <div class="stats-grid" id="statsGrid">
      <div class="stat"><div class="stat-label">Total de leads</div><div class="stat-val" id="st-total">...</div></div>
      <div class="stat"><div class="stat-label">Novos</div><div class="stat-val" id="st-novo">...</div></div>
      <div class="stat"><div class="stat-label">Em atendimento</div><div class="stat-val" id="st-atend">...</div></div>
      <div class="stat"><div class="stat-label">Finalizados</div><div class="stat-val" id="st-fin">...</div></div>
    </div>
    <div class="toolbar">
      <input type="text" id="searchInput" placeholder="Buscar cliente..." oninput="renderLeads()" />
      <select id="filterStatus" onchange="renderLeads()">
        <option value="">Todos os status</option>
        <option value="Novo">Novo</option>
        <option value="Em atendimento">Em atendimento</option>
        <option value="Finalizado">Finalizado</option>
      </select>
      <button class="btn-export" onclick="exportCSV()"><i class="ti ti-download" style="font-size:13px;"></i> Exportar</button>
    </div>
    <div class="detail-box" id="detailBox"></div>
    <div class="card">
      <div class="card-header"><h3>Clientes cadastrados</h3><button class="btn-export" onclick="loadLeads()"><i class="ti ti-refresh" style="font-size:13px;"></i> Atualizar</button></div>
      <div id="leadsList"><div class="loading">Carregando leads...</div></div>
    </div>
  </div>
</div>

<script>
let leads = [];
let selectedId = null;

function showPage(p, btn) {
  document.querySelectorAll(".page").forEach(el=>el.classList.remove("active"));
  document.querySelectorAll(".nav-btn").forEach(el=>el.classList.remove("active"));
  document.getElementById("page-"+p).classList.add("active");
  btn.classList.add("active");
  if(p==="painel") loadLeads();
}

async function loadLeads() {
  try {
    const r = await fetch("/api/leads");
    leads = await r.json();
    renderLeads();
  } catch(e) {
    document.getElementById("leadsList").innerHTML = '<div class="empty">Erro ao carregar leads.</div>';
  }
}

function ini(nome){return (nome||"?").split(" ").map(w=>w[0]).join("").substring(0,2).toUpperCase();}

function statusClass(s){
  if(s==="Novo") return "s-Novo";
  if(s==="Em atendimento") return "s-Em atendimento";
  return "s-Finalizado";
}

async function cycleStatus(id) {
  const l = leads.find(x=>x.id===id);
  if(!l) return;
  const statuses = ["Novo","Em atendimento","Finalizado"];
  const next = statuses[(statuses.indexOf(l.status)+1)%3];
  await fetch("/api/leads", {
    method:"PATCH",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({id, status: next})
  });
  l.status = next;
  renderLeads();
  if(selectedId===id) showDetail(id);
}

function showDetail(id) {
  selectedId = id;
  const l = leads.find(x=>x.id===id);
  const box = document.getElementById("detailBox");
  if(!l){box.classList.remove("open");return;}
  box.classList.add("open");
  box.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
      <div style="display:flex;align-items:center;gap:10px;">
        <div class="av" style="width:40px;height:40px;font-size:14px;">${ini(l.nome)}</div>
        <div><p style="font-size:14px;font-weight:500;color:#222;">${l.nome}</p><span style="font-size:12px;color:#666;">${l.interesse||""}</span></div>
      </div>
      <button onclick="document.getElementById('detailBox').classList.remove('open');selectedId=null;" style="background:none;border:none;cursor:pointer;color:#666;font-size:18px;"><i class="ti ti-x"></i></button>
    </div>
    <div class="detail-grid">
      <div class="detail-field"><label>Telefone</label><p>${l.telefone||"-"}</p></div>
      <div class="detail-field"><label>Origem</label><p>${l.origem||"-"}</p></div>
      <div class="detail-field"><label>Data</label><p>${l.data||""} ${l.hora||""}</p></div>
      <div class="detail-field"><label>Status</label><p><span class="status-pill ${statusClass(l.status)}" onclick="cycleStatus(${l.id})">${l.status}</span></p></div>
    </div>
    <button class="wbtn" onclick="window.open('https://wa.me/${l.telefone}','_blank')"><i class="ti ti-brand-whatsapp" style="font-size:14px;"></i> Contatar via WhatsApp</button>`;
}

function renderLeads() {
  const search = document.getElementById("searchInput").value.toLowerCase();
  const fS = document.getElementById("filterStatus").value;
  const filtered = leads.filter(l => {
    return (!fS||l.status===fS) && (!search||l.nome?.toLowerCase().includes(search)||l.telefone?.includes(search));
  });
  const list = document.getElementById("leadsList");
  if(filtered.length===0){list.innerHTML='<div class="empty">Nenhum lead encontrado.</div>';return;}
  list.innerHTML = filtered.map(l=>`
    <div class="lead-row" onclick="showDetail(${l.id})">
      <div class="av">${ini(l.nome)}</div>
      <div class="lead-info"><p>${l.nome}</p><span>${l.telefone||""} · ${l.interesse||""} · ${l.origem||""}</span></div>
      <span class="status-pill ${statusClass(l.status)}" onclick="event.stopPropagation();cycleStatus(${l.id})">${l.status}</span>
      <span style="font-size:11px;color:#999;">${l.hora||""}</span>
    </div>`).join("");
  document.getElementById("st-total").textContent = leads.length;
  document.getElementById("st-novo").textContent = leads.filter(x=>x.status==="Novo").length;
  document.getElementById("st-atend").textContent = leads.filter(x=>x.status==="Em atendimento").length;
  document.getElementById("st-fin").textContent = leads.filter(x=>x.status==="Finalizado").length;
}

function exportCSV() {
  if(leads.length===0){alert("Nenhum lead para exportar.");return;}
  const header = "Nome,Telefone,Interesse,Origem,Status,Data,Hora";
  const rows = leads.map(l=>`"${l.nome}","${l.telefone}","${l.interesse}","${l.origem}","${l.status}","${l.data}","${l.hora}"`);
  const csv = "\uFEFF"+header+"\n"+rows.join("\n");
  const blob = new Blob([csv],{type:"text/csv;charset=utf-8;"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");a.href=url;a.download="leads_3a_mangueiras.csv";a.click();
  URL.revokeObjectURL(url);
}

const chat = document.getElementById("chat");
let step="start", clienteNome="", clienteTel="", clienteCategoria="", destinoAtual="";
const menuOpts=[{label:"1 - Mangueiras e fixadores",value:"mangueiras"},{label:"2 - Parafusos",value:"parafusos"},{label:"3 - Elétrica",value:"eletrica"},{label:"4 - Tintas",value:"tintas"},{label:"5 - Automotivo",value:"automotivo"},{label:"6 - EPI",value:"epi"},{label:"7 - Falar com vendedor",value:"vendedor"},{label:"8 - Falar com o financeiro",value:"financeiro"}];
const menuLabels={mangueiras:"Mangueiras e fixadores",parafusos:"Parafusos",eletrica:"Elétrica",tintas:"Tintas",automotivo:"Automotivo",epi:"EPI",vendedor:"Falar com vendedor",financeiro:"Falar com o financeiro"};

function addBubble(text,type,delay){setTimeout(()=>{const b=document.createElement("div");b.className="bubble "+type;b.innerHTML=text;chat.appendChild(b);chat.scrollTop=chat.scrollHeight;},delay||0);}
function addOptions(opts,delay){setTimeout(()=>{const wrap=document.createElement("div");wrap.className="opts";wrap.id="opts";opts.forEach(o=>{const btn=document.createElement("button");btn.className="opt-btn";btn.textContent=o.label;btn.onclick=()=>{removeOpts();handleOption(o.value);};wrap.appendChild(btn);});chat.appendChild(wrap);chat.scrollTop=chat.scrollHeight;},delay||0);}
function removeOpts(){const o=document.getElementById("opts");if(o)o.remove();}
function showMenu(delay){addBubble(`<span class="tag">Menu principal</span><br>Como posso te ajudar?<br><br><b>1.</b> Mangueiras e fixadores<br><b>2.</b> Parafusos<br><b>3.</b> Elétrica<br><b>4.</b> Tintas<br><b>5.</b> Automotivo<br><b>6.</b> EPI<br><b>7.</b> Falar com vendedor<br><b>8.</b> Falar com o financeiro`,"bot",delay);addOptions(menuOpts,(delay||0)+200);step="menu";}
function handleOption(val){if(val==="_menu"){clienteNome="";clienteTel="";clienteCategoria="";destinoAtual="";showMenu(300);return;}clienteCategoria=menuLabels[val]||val;addBubble(menuLabels[val]||val,"user");if(val==="financeiro"){destinoAtual="financeiro";addBubble("Vou te conectar com o <b>financeiro</b>. Preciso de alguns dados.","bot",500);setTimeout(()=>pedirNome(),1000);}else if(val==="vendedor"){destinoAtual="vendedor";addBubble("Vou te conectar com nosso <b>vendedor</b>. Preciso de alguns dados.","bot",500);setTimeout(()=>pedirNome(),1000);}else{destinoAtual="vendedor";addBubble(`Ótimo! Para te ajudar com <b>${menuLabels[val]}</b>, vou conectar com nosso vendedor.`,"bot",500);setTimeout(()=>pedirNome(),1000);}}
function pedirNome(){step="nome";addBubble("Qual é o seu <b>nome completo</b>?","bot",200);document.getElementById("userInput").focus();}
function pedirTelefone(){step="telefone";addBubble(`Prazer, <b>${clienteNome.split(" ")[0]}</b>! 😊<br>Seu WhatsApp com DDD:<br><i>(Ex: 92999999999)</i>`,"bot",300);}
function pedirOrigem(){step="origem";addBubble(`Por onde você nos encontrou?<br><br>1️⃣ Google<br>2️⃣ Facebook<br>3️⃣ Instagram<br>4️⃣ Site<br>5️⃣ Indicação`,"bot",400);addOptions([{label:"1 - Google",value:"Google"},{label:"2 - Facebook",value:"Facebook"},{label:"3 - Instagram",value:"Instagram"},{label:"4 - Site",value:"Site"},{label:"5 - Indicação",value:"Indicação"}],600);}
function finalizarCadastro(origem){step="done";addBubble(`✅ <b>Cadastro realizado!</b><br><br>Nosso ${destinoAtual} entrará em contato em breve! 👍<br><br>Para voltar ao menu, clique abaixo.`,"bot",500);setTimeout(()=>{addOptions([{label:"Voltar ao menu principal",value:"_menu"}],400);},1500);}
function sendUserMsg(){const inp=document.getElementById("userInput");const val=inp.value.trim();if(!val)return;inp.value="";addBubble(val,"user");if(step==="nome"){clienteNome=val;pedirTelefone();}else if(step==="telefone"){clienteTel=val;pedirOrigem();}else if(step==="menu"||step==="start"){addBubble("Por favor, escolha uma opção do menu.","bot",300);}}
document.getElementById("userInput").addEventListener("keydown",e=>{if(e.key==="Enter")sendUserMsg();});
addBubble("Olá! Seja bem-vindo à <b>3A Mangueiras e Fixadores</b> 👋<br>Sou o assistente virtual da loja.","bot",300);
showMenu(900);
</script>
</body>
</html>
